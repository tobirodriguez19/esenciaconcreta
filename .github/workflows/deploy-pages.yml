name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Wait for active Pages deployment to finish
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const activeStatuses = new Set(["queued", "pending", "building", "in_progress"]);
            const maxAttempts = 30;
            const delayMs = 10000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data } = await github.request("GET /repos/{owner}/{repo}/pages/deployments", {
                owner,
                repo,
                per_page: 10
              });

              const active = data.find((deployment) => {
                const status = (
                  deployment?.latest_status?.status ||
                  deployment?.status ||
                  ""
                ).toLowerCase();
                return activeStatuses.has(status);
              });

              if (!active) {
                core.info("No active Pages deployment found.");
                return;
              }

              const status = active?.latest_status?.status || active?.status || "unknown";
              core.info(`Active Pages deployment ${active.id} is ${status}. Waiting before deploy...`);

              if (attempt === maxAttempts) {
                core.setFailed("Timed out waiting for an active Pages deployment to finish.");
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, delayMs));
            }
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 1800000
